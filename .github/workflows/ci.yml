name: CI/CD Pipeline

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential rpm
    
    - name: Configure CMake
      run: |
        mkdir -p _build
        cd _build
        cmake -DCMAKE_BUILD_TYPE=Release -DCPACK_GENERATOR="DEB;RPM;TGZ" ..
    
    - name: Build and package
      run: |
        cd _build
        cmake --build . --target package
    
    - name: List packages
      run: ls -la _build/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.ref_name }}
        body: |
          ## Релиз ${{ github.ref_name }}
          
          ### Пакеты:
          - DEB пакет для Debian/Ubuntu
          - RPM пакет для Fedora/RHEL
          - TGZ архив
        draft: false
        prerelease: false
        files: |
          _build/*.deb
          _build/*.rpm
          _build/*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
